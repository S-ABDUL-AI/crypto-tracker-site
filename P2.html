    /* HERO SECTION */
    .hero.dark-bg {
      background: #f4f4f4;
      text-align: center;
      padding: 80px 20px;
    }

    .hero.dark-bg h1 {
      font-family: "Source Sans 3", system-ui, sans-serif;
      font-size: 2.5rem;
      color: #111;
    }

    /* PROJECT STYLES */
    .dropdown {
      margin-bottom: 20px;
    }

    .dropdown button {
      width: 100%;
      padding: 10px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      background: #222;
      color: #fff;
      border: none;
      border-radius: 5px;
      text-align: left;
      transition: all 0.3s ease;
    }

    .dropdown button:hover { background: #444; }
    .dropdown.active button {
      background: #155d86;
      color: #fff;
      box-shadow: 0 0 8px rgba(21, 101, 192, 0.6);
    }

    .dropdown-content {
      display: none;
      margin-top: 10px;
      padding-left: 15px;
    }
    .dropdown.active .dropdown-content { display: block; }

    .project {
      margin-bottom: 12px;
      font-size: 1rem;
      line-height: 1.6;
      display: flex;
      align-items: baseline;
    }

    .project a {
      font-weight: bold;
      font-size: 1.08rem;
      color: #155d86;
      text-decoration: none;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      transition: all 0.2s ease;
    }

    .project a:hover {
      color: #155d86;
      text-decoration: underline;
      text-shadow: 0 0 6px rgba(21, 101, 192, 0.4);
    }

    .project::before {
      content: "➡️ ";
      margin-right: 6px;
      font-size: 1rem;
    }

    .project span {
      font-style: italic;
      color: #555;
      margin-left: 6px;
      font-family: Georgia, "Times New Roman", serif;
    }

    footer.dark-bg {
      background: #222;
      color: #fff;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
    }

    footer .footer-legal-p2 {
      margin: 0.5rem 0 0;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.72);
    }
  </style>

  <script>
    function toggleDropdown(button) {
      button.parentElement.classList.toggle("active");
    }
    window.onclick = function(event) {
      if (!event.target.matches('.dropdown button')) {
        document.querySelectorAll(".dropdown").forEach(dropdown => {
          dropdown.classList.remove('active');
        });
      }
    };
